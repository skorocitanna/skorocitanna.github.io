<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вектор</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css?v=1.0.8">
    <link rel="stylesheet" href="../js/game-widgets.css">
</head>
<body>
    <header class="game-header">
        <h1>Вектор</h1>
    </header>

    <div class="app">
        <div class="panel">
            <div class="topbar">
                <div class="status">
                    <div class="badge">Час: <span id="time">180</span>с</div>
                    <div class="badge">Рахунок: <span id="score">0</span></div>
                    <div class="badge lives" id="lives">❤️❤️❤️❤️❤️</div>
                </div>
                <div class="controls">
                    <button class="btn-stop-resume" id="btn-stop-resume">Зупинити</button>
                </div>
            </div>

            <h2 class="subtitle" id="rule-text">Синій фон — натисни напрямок польоту. Червоний — протилежний.</h2>

            <div class="stage" aria-live="polite">
                <div class="arena" id="arena">
                    <div class="plane" id="plane" aria-label="Літак"></div>
                </div>
            </div>

            <div class="actions actions--arrows" aria-label="Керування стрілками">
                <div class="arrow-pad">
                    <div class="arrow-row">
                        <button class="btn-arrow" id="btn-up" aria-label="Вгору">↑</button>
                    </div>
                    <div class="arrow-row">
                        <button class="btn-arrow" id="btn-left" aria-label="Вліво">←</button>
                        <button class="btn-arrow" id="btn-down" aria-label="Вниз">↓</button>
                        <button class="btn-arrow" id="btn-right" aria-label="Вправо">→</button>
                    </div>
                </div>
            </div>

            <div class="start-screen" id="start-screen">
                <div class="start-content">
                    <h3>Готові?</h3>
                    <button class="btn-start" id="start-btn">Старт</button>
                </div>
            </div>

            <div class="overlay hidden" id="countdown">3</div>

            <div class="result" id="result">
                <div class="result-card">
                    <h2>Гру завершено</h2>
                    <div>Правильних відповідей: <span id="correct">0</span> з <span id="total">0</span></div>
                    <div id="gw-leaderboard-inline"><ul id="best-list" style="display:none"></ul></div>
                    <button id="play-again">Грати знову</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/analytics.js"></script>
    <script src="../js/game-widgets.js"></script>
    <script src="./js/airport.js?v=1.0.8"></script>
</body>
</html>
