<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Бонобо</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css?v=1.0.8">
    <link rel="stylesheet" href="../js/game-widgets.css">
</head>
<body>
    <header class="game-header">
        <h1>Бонобо</h1>
    </header>

    <div class="app">
        <div class="panel">
            <div class="topbar">
                <div class="status">
                    <div class="badge">Час: <span id="time">180</span>с</div>
                    <div class="badge">Чисел: <span id="level">4</span></div>
                    <div class="badge">Раунд: <span id="sublevel">1</span> / 6</div>
                    <div class="badge">Крок: <span id="progress">0</span> / <span id="total">0</span></div>
                    <div class="badge lives" id="lives">❤️❤️❤️</div>
                </div>
                <div class="controls">
                    <button class="btn-stop-resume" id="btn-stop-resume">Зупинити</button>
                    <button class="btn-exit" id="btn-exit">До рівнів</button>
                </div>
            </div>

            <div class="task-line" id="task">Запам'ятайте числа</div>

            <div class="stage" aria-live="polite">
                <div class="grid" id="grid"></div>
            </div>

            <div class="start-screen" id="start-screen">
                <div class="start-content">
                    <h3>Оберіть кількість чисел</h3>
                    <p class="training-tip">Для швидшого вдосконалення навичок тренуйтеся на складних для Вас рівнях!</p>
                    <div class="level-grid" id="level-grid">
                        <button class="level-btn" data-level="4"><span>4</span></button>
                        <button class="level-btn" data-level="5"><span>5</span></button>
                        <button class="level-btn" data-level="6"><span>6</span></button>
                        <button class="level-btn" data-level="7"><span>7</span></button>
                        <button class="level-btn" data-level="8"><span>8</span></button>
                        <button class="level-btn" data-level="9"><span>9</span></button>
                        <button class="level-btn" data-level="10"><span>10</span></button>
                        <button class="level-btn" data-level="11"><span>11</span></button>
                        <button class="level-btn" data-level="12"><span>12</span></button>
                        <button class="level-btn" data-level="13"><span>13</span></button>
                        <button class="level-btn" data-level="14"><span>14</span></button>
                    </div>
                    <div class="level-hint" id="level-hint">запам’ятайте і натискайте за зростанням</div>
                </div>
            </div>

            <div class="overlay hidden" id="countdown">3</div>

            <div class="result" id="result">
                <div class="result-card">
                    <h2>Гру завершено</h2>
                    <div>Виконано кроків: <span id="correct">0</span> з <span id="total-result">0</span></div>
                    <div class="result-sub" id="result-sub">Раунд завершено</div>
                    <div id="gw-leaderboard-inline"><span id="best-level" style="display:none">4</span><ul id="best-list" style="display:none"></ul></div>
                    <button id="play-again">Грати знову</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/analytics.js"></script>
    <script src="../js/game-widgets.js"></script>
    <script src="./js/steps.js?v=1.0.8"></script>
</body>
</html>
