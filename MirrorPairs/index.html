<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Дзеркальні пари</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css?v=1.0.8">
    <link rel="stylesheet" href="../js/game-widgets.css">
</head>
<body>
    <header class="game-header">
        <h1>Дзеркальні пари</h1>
    </header>

    <div class="app">
        <div class="panel">
            <div class="topbar">
                <div class="status">
                    <div class="badge">Час: <span id="time">180</span>с</div>
                    <div class="badge">Рівень: <span id="level">1</span></div>
                    <div class="badge">Субрівень: <span id="sublevel">1</span> / 5</div>
                    <div class="badge">Кроки: <span id="moves">0</span></div>
                    <div class="badge">Пари: <span id="pairs">0</span> / <span id="total-pairs">0</span></div>
                    <div class="badge lives" id="lives">❤️❤️❤️❤️❤️</div>
                </div>
                <div class="controls">
                    <button class="btn-exit" id="btn-exit">До рівнів</button>
                </div>
            </div>

            <div class="helper" style="padding-bottom: 40px;">
                <!-- <div class="rule">
                    На полі лежать картки сорочкою догори. Гравець по черзі відкриває дві картки.
                    Якщо зображення однакові — пара зараховується і картки лишаються відкритими.
                    Якщо різні — закриваються назад після короткої паузи. Мета — знайти всі пари.
                </div> -->
            </div>

            <div class="stage" aria-live="polite">
                <div class="board" id="board"></div>
            </div>

            <div class="start-screen" id="start-screen">
                <div class="start-content">
                    <h3>Оберіть рівень</h3>
                    <p class="training-tip">Для швидшого вдосконалення навичок тренуйтеся на складних для Вас рівнях!</p>
                    <div class="level-grid" id="level-grid">
                        <button class="level-btn" data-level="1"><span>1</span><small>Новачок</small></button>
                        <button class="level-btn" data-level="2"><span>2</span><small>Початківець</small></button>
                        <button class="level-btn" data-level="3"><span>3</span><small>Учень</small></button>
                        <button class="level-btn" data-level="4"><span>4</span><small>Аматор</small></button>
                        <button class="level-btn" data-level="5"><span>5</span><small>Спеціаліст</small></button>
                        <button class="level-btn" data-level="6"><span>6</span><small>Фахівець</small></button>
                        <button class="level-btn" data-level="7"><span>7</span><small>Профі</small></button>
                        <button class="level-btn" data-level="8"><span>8</span><small>Експерт</small></button>
                        <button class="level-btn" data-level="9"><span>9</span><small>Майстер</small></button>
                        <button class="level-btn" data-level="10"><span>10</span><small>Гуру</small></button>
                    </div>
                    <!-- <div class="level-hint" id="level-hint">Складність зростає поступово</div> -->
                </div>
            </div>

            <div class="overlay hidden" id="countdown">3</div>

            <div class="result" id="result">
                <div class="result-card">
                    <h2>Рівень завершено</h2>
                    <div>Кроків за рівень: <span id="final-moves">0</span></div>
                    <div>Знайдено пар: <span id="final-pairs">0</span></div>
                    <div id="gw-leaderboard-inline"></div>
                    <button id="play-again">Грати знову</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/analytics.js"></script>
    <script src="../js/game-widgets.js"></script>
    <script src="./js/concentration.js?v=1.0.8"></script>
</body>
</html>
